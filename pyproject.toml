[tool.ruff]
target-version = "py311"
line-length = 100
src = ["tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["tests/"]
exclude = ["tests/e2e_tests/test_", "tests/e2e_tests/conftest\\.py"]
