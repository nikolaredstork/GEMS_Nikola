docs_dir: doc
exclude_docs: |
  documentation_env/
  2_Getting_Started/Tutorial_2_PyPSA_eur/*
site_name: GEMS - Generic Energy system Modelling Scheme
site_url: https://gems-energy.readthedocs.io/en/latest/
site_description: "GEMS (Generic Energy system Modelling Scheme) is a graph-based algebraic modelling language for defining and solving energy system optimisation problems."
site_author: "Antares Simulator Team - RTE"
copyright: "Copyright &copy; 2026 RTE"
repo_url: https://github.com/AntaresSimulatorTeam/GEMS
edit_uri: edit/doc/doc/

theme:
  name: material
  logo: assets/gemsV2.png
  favicon: assets/0_gems_favicon.png
  prev_next_buttons_location: none
  features:
    - navigation.instant
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - content.action.copy
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  # YAML Dynamic Loader - Dependencies
  - https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js
  # YAML Dynamic Loader - Custom script
  - javascripts/yaml-loader.js

extra_css:
  - stylesheets/yaml-loader.css

plugins:
  - search
  - macros:
      module_name: main
  - git-revision-date-localized:
      exclude:
        - documentation_env/*
        - 2_Getting_Started/Tutorial_2_PyPSA_eur/pypsa-eur/*
      enable_creation_date: true
      enable_git_follow: true
      type: timeago
      timezone: Europe/Paris
      fallback_to_build_date: true

