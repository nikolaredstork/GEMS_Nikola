name: "LT-02 — Internal library or taxonomy development"
description: Track bug fixes, model improvements, or modifications to an existing GEMS library or taxonomy
title: "[LT-02] "
labels: ["LT-02"]
body:
  - type: markdown
    attributes:
      value: |
        **Process LT-02** — Triggered by internal initiative to fix, improve, or modify an existing GEMS model library or taxonomy. Not driven by an external tool update.

        > **Deviation from standard workflow — Step 5:** explicitly validate that optimization results do not change unintentionally. If results must change, provide comparison studies and document the reasoning.

  - type: dropdown
    id: affected_library
    attributes:
      label: Affected Library / Taxonomy
      options:
        - basic_models_library
        - antares_legacy_models
        - pypsa_models
        - andromede_models
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Type of Change
      description: Determines the semantic version impact.
      options:
        - "Major — new model or metric added"
        - "Minor — bug fix, model improvement, or modification"
        - "Patch — non-functional update (rename variable/parameter, internal refactor)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What change is being proposed and why?
    validations:
      required: true

  - type: textarea
    id: results_impact
    attributes:
      label: Results Impact
      description: |
        Are optimization results (objective function values) expected to change?
        If yes: describe the before/after difference and why it is intended.
        If no: this must be confirmed via E2E tests.
    validations:
      required: true

  - type: textarea
    id: validation_strategy
    attributes:
      label: Validation Strategy
      description: |
        Describe the validation approach:
        - If results change: provide comparison studies (before vs after)
        - If results must not change: describe which E2E tests confirm equivalence
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Process Checklist
      value: |
        ### Step 1 — Issue Creation
        - [x] Issue created and linked to process LT-02

        ### Step 2 — Triage
        - [ ] Process confirmed applicable
        - [ ] Assigned to responsible contributor
        - [ ] Priority and milestone set (if applicable)

        ### Step 3 — Impact Analysis
        - [ ] Affected models identified within the library
        - [ ] All studies in `resources/` referencing affected models identified (grep for model ID)
        - [ ] Breaking vs backward-compatible change determined
        - [ ] Results impact assessed and declared (change intended / no change intended)
        - [ ] Dependencies assessed (other libraries or studies that rely on this model)

        ### Step 4 — Implementation
        - [ ] Library YAML updated (`libraries/<library>.yml`)
        - [ ] All referencing studies verified (parameter counts match model definition, port refs valid)
        - [ ] Backward compatibility maintained unless explicitly intended as breaking

        ### Step 5 — Testing & Validation ⚠️ validate no unintended optimization changes
        - [ ] Unit tests pass
        - [ ] If results are expected to change: comparison studies provided with documented differences
        - [ ] If results must not change: E2E tests confirm objective values are identical (within tolerance)
        - [ ] E2E tests pass

        ### Step 6 — CI Validation
        - [ ] E2E tests pass in CI

        ### Step 7 — Review & Merge
        - [ ] PR reviewed alongside documentation changes

        ### Step 8 — Versioning
        - [ ] `version` field bumped in `libraries/<library>.yml` per semantic versioning rules

        ### Step 9 — Documentation & Changelog
        - [ ] Changelog entry added (`libraries/CHANGELOG-<library>.md`)
        - [ ] Documentation updated if model behavior or interface changed
        - [ ] `AGENTS.md` reviewed for impact and updated if needed

        ### Step 10 — Release
        - [ ] If a release is needed: follow the release process in the Developer Guidelines
