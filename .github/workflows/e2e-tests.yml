name: End-to-End Tests

on:
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  read-version:
    name: Read Antares version
    runs-on: ubuntu-22.04
    outputs:
      antares_version: ${{ steps.read.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read Antares version
        id: read
        run: |
          VERSION=$(jq -r '.antares_simulator_version' dependencies.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E Tests
    needs: read-version
    uses: ./.github/workflows/run-e2e-tests.yml
    with:
      antares_version: ${{ needs.read-version.outputs.antares_version }}
      artifact_name: e2e-test-failures
