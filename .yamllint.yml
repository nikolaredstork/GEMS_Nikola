---
extends: default

rules:
  line-length:
    max: 200
    level: warning
  document-start:
    present: false
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
  comments:
    min-spaces-from-content: 1
  braces:
    forbid: false
  brackets:
    forbid: false
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false

ignore: |
  venv/
  documentation_env/
  site/
  .github/ISSUE_TEMPLATE/
  resources/**/model-libraries/
